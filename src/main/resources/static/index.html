<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>easyTask</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@700,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<header id="topbar" class="topbar hidden">
  <div class="topbar-left">
    <a class="topbar-brand" href="#/workspaces"><span class="logo" aria-hidden="true"></span>easyTask</a>
    <nav id="breadcrumbs" class="breadcrumbs"></nav>
  </div>
  <div class="topbar-right">
    <button class="icon-btn" id="search-btn" type="button" title="Search — coming soon" disabled>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M11 11L14.5 14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
    <button class="icon-btn theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme" aria-pressed="false">
      <span class="theme-icon theme-icon-sun"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3.2" stroke="currentColor" stroke-width="1.3"/><path d="M8 1.3V3M8 13v1.7M2.6 8H1M15 8h-1.6M3.5 3.5l1.2 1.2M11.3 11.3l1.2 1.2M3.5 12.5l1.2-1.2M11.3 4.7l1.2-1.2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></span>
      <span class="theme-icon theme-icon-moon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13.5 9.5A6 6 0 116.5 2.5a5 5 0 007 7z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg></span>
    </button>
    <div class="profile-wrap">
      <button class="profile-chip" id="profile-chip" type="button" aria-haspopup="true" aria-expanded="false">
        <span class="avatar" id="profile-avatar"></span>
        <span class="profile-name" id="profile-name"></span>
        <span class="chevron"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      </button>
      <div class="profile-menu hidden" id="profile-menu">
        <button class="profile-menu-item" id="logout-btn" type="button">Log out</button>
      </div>
    </div>
  </div>
</header>

<main id="app-root" class="app-root"></main>

<div id="modal-root"></div>
<div id="toast-root" class="toast-root"></div>

<script src="/app.js"></script>
</body>
</html>
