spring.application.name=easyTask
spring.profiles.active=cloud

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/easytask}
spring.datasource.username=${DB_USERNAME:easytask}
spring.datasource.password=${DB_PASSWORD:easytask}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true

app.registration.public-signup-enabled=false

app.jwt.secret=${JWT_SECRET:dev-only-insecure-secret-replace-in-every-real-deployment}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:10080}

app.invite.expiration-days=${INVITE_EXPIRATION_DAYS:7}